<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/users.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аднимистрирование</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.3/themes/base/jquery-ui.css">
</head>
<body>

<meta name="_csrf" th:content="${_csrf.token}"/>
<meta name="_csrf_header" th:content="${_csrf.headerName}"/>

<div class="user-creation-layout">

    <!-- Форма создания пользователя -->
    <div class="user-form-container">
        <h2 class="text-xl font-semibold mb-4">Создание нового пользователя</h2>

        <div th:if="${param.success != null}" class="alert alert-success mb-4">
            <i class="fas fa-check-circle me-2"></i> Пользователь успешно создан
        </div>

        <div th:if="${param.error != null}" class="alert alert-danger mb-4">
            <i class="fas fa-exclamation-circle me-2"></i> Ошибка создания пользователя
        </div>

        <form th:action="@{/users/create}" method="post" class="bg-white p-6 rounded-lg shadow">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="grid mb-4">
                <!-- ФИО -->
                <div class="col-span-2">
                    <label for="lastName" class="form-label">Фамилия *</label>
                    <input type="text" id="lastName" name="lastName" class="form-input-field" required />
                </div>

                <div class="col-span-1">
                    <label for="firstName" class="form-label">Имя *</label>
                    <input type="text" id="firstName" name="firstName" class="form-input-field" required />
                </div>

                <div class="col-span-1">
                    <label for="middleName" class="form-label">Отчество</label>
                    <input type="text" id="middleName" name="middleName" class="form-input-field" />
                </div>

                <!-- Роль -->
                <div class="col-span-2">
                    <label for="roleId" class="form-label">Роль *</label>
                    <select id="roleId" name="roleId" class="form-select-field" required onchange="handleRoleChange()">
                        <option value="">-- Выберите роль --</option>
                        <option th:each="role : ${viewModel.availableRoles}"
                                th:value="${role.key}"
                                th:text="${role.value}">
                        </option>
                    </select>
                </div>

                <!-- Динамические поля (появляются в зависимости от роли) -->
                <div id="dynamicFields" class="col-span-2"></div>

                <!-- Контактная информация -->
                <div class="col-span-2">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input-field" />
                </div>

                <div class="col-span-1">
                    <label for="phone" class="form-label">Телефон</label>
                    <input type="tel" id="phone" name="phone" class="form-input-field" />
                </div>

                <div class="col-span-1">
                    <label for="birthDate" class="form-label">Дата рождения</label>
                    <input type="date" id="birthDate" name="birthDate" class="form-input-field" />
                </div>

                <!-- Дополнительная информация -->
                <div class="col-span-2">
                    <label for="info" class="form-label">Дополнительная информация</label>
                    <textarea id="info" name="info" rows="3" class="form-input-field"></textarea>
                </div>

                <!-- Логин и пароль (опционально) -->
                <div class="col-span-1">
                    <label for="login" class="form-label">Логин (опционально)</label>
                    <input type="text" id="login" name="login" class="form-input-field" placeholder="Будет сгенерирован автоматически" />
                </div>

                <div class="col-span-1">
                    <label for="password" class="form-label">Пароль (опционально)</label>
                    <input type="text" id="password" name="password" class="form-input-field" placeholder="Будет сгенерирован автоматически" />
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-user-plus mr-2"></i> Создать пользователя
            </button>
        </form>
    </div>

    <!-- Панель администрирования (доступна для ADMIN и DIRECTOR) -->
    <div th:if="${#authorization.expression('hasRole(''DIRECTOR'')') or #authorization.expression('hasRole(''ADMIN'')')}" class="admin-tools-container">
        <h3 class="text-lg font-semibold mb-3 text-gray-700">
            <i class="fas fa-tools mr-2"></i> Дополнительные инструменты
        </h3>
        <p class="text-sm text-gray-600 mb-4">Управляйте классами и предметами школы.</p>
        <button type="button" id="openClassModal" class="btn-admin-tool">
            <i class="fas fa-school mr-2"></i> Управление классами
        </button>
        <button type="button" id="openSubjectModal" class="btn-admin-tool">
            <i class="fas fa-book-open mr-2"></i> Управление предметами
        </button>
    </div>
</div>

<!-- Модальное окно управления классами -->
<div id="classManagementModal" class="modal-overlay hidden">
    <div class="modal-content-form">
        <div class="modal-form-header">
            Управление классами
        </div>

        <div id="classManagementContent" class="modal-form-body">
            <p>Загрузка данных...</p>
        </div>

        <div class="modal-form-actions">
            <button type="button" class="btn-secondary-text close-modal">Закрыть</button>
        </div>
    </div>
</div>

<!-- Модальное окно управления предметами -->
<div id="subjectManagementModal" class="modal-overlay hidden">
    <div class="modal-content-form">
        <div class="modal-form-header">
            Управление предметами
        </div>

        <div id="subjectManagementContent" class="modal-form-body">
            <p>Загрузка данных...</p>
        </div>

        <div class="modal-form-actions">
            <button type="button" class="btn-secondary-text close-modal">Закрыть</button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    // Данные для динамических полей (передаем из контроллера)
    const schoolClasses = /*[[${viewModel.schoolClasses}]]*/ [];
    const allStudents = /*[[${viewModel.allStudents}]]*/ [];

    function handleRoleChange() {
        const roleSelect = $('#roleId');
        const selectedRoleText = roleSelect.find('option:selected').text();
        const dynamicFields = $('#dynamicFields');

        dynamicFields.empty();

        if (selectedRoleText === 'STUDENT' || selectedRoleText === 'Ученик') {
            let options = '<option value="">-- Выберите класс --</option>';
            schoolClasses.forEach(function(item) {
                options += `<option value="${item.key}">${item.value}</option>`;
            });
            dynamicFields.html(`
                <div class="col-span-2">
                    <label for="classId" class="form-label">Класс ученика *</label>
                    <select id="classId" name="classId" class="form-select-field" required>
                        ${options}
                    </select>
                </div>
            `);
        } else if (selectedRoleText === 'PARENT' || selectedRoleText === 'Родитель') {
            let options = '<option value="">-- Выберите ученика --</option>';
            allStudents.forEach(function(item) {
                options += `<option value="${item.key}">${item.value}</option>`;
            });
            dynamicFields.html(`
                <div class="col-span-2">
                    <label for="studentIdForParent" class="form-label">Привязать к ученику *</label>
                    <select id="studentIdForParent" name="studentIdForParent" class="form-select-field" required>
                        ${options}
                    </select>
                </div>
            `);
        }
    }

    $(document).ready(function() {
        // Инициализация
        handleRoleChange();

        // CSRF токен
        const csrfToken = $('meta[name="_csrf"]').attr('content');
        const csrfHeader = $('meta[name="_csrf_header"]').attr('content');

        // Настраиваем AJAX для всех POST запросов
        $.ajaxSetup({
            beforeSend: function(xhr, settings) {
                if (settings.type === 'POST' || settings.type === 'PUT' || settings.type === 'DELETE') {
                    if (csrfToken && csrfHeader) {
                        xhr.setRequestHeader(csrfHeader, csrfToken);
                    }
                }
            }
        });

        const classModal = $('#classManagementModal');
        const subjectModal = $('#subjectManagementModal');

        // Открытие модального окна классов (обновленный JavaScript)
        $('#openClassModal').on('click', function() {
            classModal.css('display', 'flex').fadeIn(200);
            $('#classManagementContent').html('<p class="text-center py-4">Загрузка...</p>');

            $.ajax({
                url: '/users/manage-classes-partial',
                type: 'GET',
                success: function(response) {
                    if (response.success) {
                        let html = '<h4 class="font-semibold mb-3">Список классов</h4>';
                        html += '<div class="space-y-2 mb-4">';

                        response.schoolClasses.forEach(function(cls) {
                            html += `<div class="p-3 bg-gray-50 border rounded">
                                        <div class="flex justify-between items-start">
                                            <div class="flex-1">
                                                <div class="font-semibold">${cls.className}</div>
                                                <div class="text-sm text-gray-600">Классный руководитель: ${cls.classTeacherName}</div>
                                                <div class="text-sm text-gray-500">Учеников: ${cls.studentCount}</div>
                                            </div>
                                            <div class="flex gap-2">
                                                <button class="text-blue-500 edit-class hover:text-blue-700"
                                                        data-id="${cls.classId}"
                                                        data-number="${cls.classNumber}"
                                                        data-letter="${cls.classLetter}"
                                                        data-teacher="${cls.classTeacherId || ''}">
                                                    <i class="fas fa-edit"></i> Редактировать
                                                </button>
                                                ${cls.canDelete ?
                                                    `<button class="text-red-500 delete-class" data-id="${cls.classId}">
                                                        <i class="fas fa-trash"></i> Удалить
                                                    </button>` :
                                                    `<button class="text-orange-500 move-students" data-id="${cls.classId}" data-name="${cls.className}">
                                                        <i class="fas fa-users"></i> Переместить учеников
                                                    </button>`
                                                }
                                            </div>
                                        </div>
                                    </div>`;
                        });

                        html += '</div>';
                        html += '<hr class="my-4">';
                        html += '<h4 class="font-semibold mb-3">Добавить новый класс</h4>';
                        html += '<form id="addClassForm" class="space-y-3">';
                        html += '<div><input type="number" name="classNumber" placeholder="Номер класса (1-11)" class="form-input-field" required min="1" max="11" /></div>';
                        html += '<div><input type="text" name="classLetter" placeholder="Буква класса (А, Б, В...)" class="form-input-field" required maxlength="1" /></div>';
                        html += '<div><select name="classTeacherId" class="form-select-field">';
                        html += '<option value="">-- Выберите классного руководителя (опционально) --</option>';
                        response.availableTeachers.forEach(function(teacher) {
                            html += `<option value="${teacher.value}">${teacher.text}</option>`;
                        });
                        html += '</select></div>';
                        html += '<button type="submit" class="btn-primary-blue">Добавить класс</button>';
                        html += '</form>';
                        html += '<p id="classMessage" class="mt-2 text-sm"></p>';

                        // Форма для редактирования класса (скрыта по умолчанию)
                        html += '<div id="editClassFormContainer" style="display: none;" class="mt-4">';
                        html += '<hr class="my-4">';
                        html += '<h4 class="font-semibold mb-3">Редактировать класс</h4>';
                        html += '<form id="editClassForm" class="space-y-3">';
                        html += '<input type="hidden" name="classId" id="editClassId" />';
                        html += '<div><input type="number" name="classNumber" id="editClassNumber" placeholder="Номер класса" class="form-input-field" required min="1" max="11" /></div>';
                        html += '<div><input type="text" name="classLetter" id="editClassLetter" placeholder="Буква класса" class="form-input-field" required maxlength="1" /></div>';
                        html += '<div><select name="classTeacherId" id="editClassTeacherId" class="form-select-field">';
                        html += '<option value="">-- Выберите классного руководителя --</option>';
                        response.availableTeachers.forEach(function(teacher) {
                            html += `<option value="${teacher.value}">${teacher.text}</option>`;
                        });
                        html += '</select></div>';
                        html += '<button type="submit" class="btn-primary-blue">Сохранить изменения</button>';
                        html += '<button type="button" id="cancelEditClass" class="btn-secondary-text">Отмена</button>';
                        html += '</form>';
                        html += '<p id="editClassMessage" class="mt-2 text-sm"></p>';
                        html += '</div>';

                        // Форма для перемещения учеников
                        html += '<div id="moveStudentsFormContainer" style="display: none;" class="mt-4">';
                        html += '<hr class="my-4">';
                        html += '<h4 class="font-semibold mb-3">Переместить учеников</h4>';
                        html += '<form id="moveStudentsForm" class="space-y-3">';
                        html += '<input type="hidden" name="oldClassId" id="moveOldClassId" />';
                        html += '<div><label class="form-label">Выберите новый класс:</label>';
                        html += '<select name="newClassId" id="moveNewClassId" class="form-select-field" required>';
                        html += '<option value="">-- Выберите класс --</option>';
                        response.allClasses.forEach(function(cls) {
                            html += `<option value="${cls.value}">${cls.text}</option>`;
                        });
                        html += '</select></div>';
                        html += '<button type="submit" class="btn-primary-blue">Переместить всех учеников</button>';
                        html += '<button type="button" id="cancelMoveStudents" class="btn-secondary-text">Отмена</button>';
                        html += '</form>';
                        html += '<p id="moveStudentsMessage" class="mt-2 text-sm"></p>';
                        html += '</div>';

                        $('#classManagementContent').html(html);

                        // Обработчики событий
                        $('.edit-class').on('click', function() {
                            const id = $(this).data('id');
                            const number = $(this).data('number');
                            const letter = $(this).data('letter');
                            const teacherId = $(this).data('teacher');

                            $('#editClassId').val(id);
                            $('#editClassNumber').val(number);
                            $('#editClassLetter').val(letter);
                            $('#editClassTeacherId').val(teacherId);

                            $('#editClassFormContainer').show();
                            $('#moveStudentsFormContainer').hide();
                        });

                        $('.move-students').on('click', function() {
                            const id = $(this).data('id');
                            const name = $(this).data('name');

                            $('#moveOldClassId').val(id);
                            $('#moveStudentsFormContainer').show();
                            $('#editClassFormContainer').hide();
                            $('#moveStudentsMessage').text('Перемещение учеников из класса ' + name).css('color', 'blue');
                        });

                        $('#cancelEditClass').on('click', function() {
                            $('#editClassFormContainer').hide();
                        });

                        $('#cancelMoveStudents').on('click', function() {
                            $('#moveStudentsFormContainer').hide();
                        });
                    } else {
                        $('#classManagementContent').html(`<p class="text-red-500">${response.message}</p>`);
                    }
                },
                error: function(xhr) {
                    console.error(xhr);
                    $('#classManagementContent').html('<p class="text-red-500">Ошибка загрузки данных</p>');
                }
            });
        });

        // Редактирование класса
        $(document).on('submit', '#editClassForm', function(e) {
            e.preventDefault();
            const formData = $(this).serialize();

            $.ajax({
                url: '/users/edit-class',
                type: 'POST',
                data: formData,
                success: function(response) {
                    if (response.success) {
                        $('#editClassMessage').text(response.message).css('color', 'green');
                        setTimeout(() => location.reload(), 1000);
                    } else {
                        $('#editClassMessage').text(response.message).css('color', 'red');
                    }
                },
                error: function() {
                    $('#editClassMessage').text('Ошибка сети').css('color', 'red');
                }
            });
        });

        // Перемещение учеников
        $(document).on('submit', '#moveStudentsForm', function(e) {
            e.preventDefault();
            const formData = $(this).serialize();

            $.ajax({
                url: '/users/move-students',
                type: 'POST',
                data: formData,
                success: function(response) {
                    if (response.success) {
                        $('#moveStudentsMessage').text(response.message).css('color', 'green');
                        setTimeout(() => location.reload(), 1000);
                    } else {
                        $('#moveStudentsMessage').text(response.message).css('color', 'red');
                    }
                },
                error: function() {
                    $('#moveStudentsMessage').text('Ошибка сети').css('color', 'red');
                }
            });
        });

        // Открытие модального окна предметов
        $('#openSubjectModal').on('click', function() {
            subjectModal.removeClass('hidden').fadeIn(300);
            $('#subjectManagementContent').html('<p class="text-center py-4">Загрузка...</p>');

            $.ajax({
                url: '/users/manage-subjects-partial',
                type: 'GET',
                success: function(response) {
                    if (response.success) {
                        let html = '<h4 class="font-semibold mb-3">Список предметов</h4>';
                        html += '<div class="space-y-2 mb-4">';

                        response.subjects.forEach(function(subject) {
                            html += `<div class="p-2 bg-gray-50 border rounded flex justify-between">
                                        <span>${subject.subjectName}</span>
                                        <button class="text-red-500 delete-subject" data-id="${subject.subjectId}">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>`;
                        });

                        html += '</div>';
                        html += '<h4 class="font-semibold mb-3">Добавить новый предмет</h4>';
                        html += '<form id="addSubjectForm" class="space-y-3">';
                        html += '<div><input type="text" name="subjectName" placeholder="Название предмета" class="form-input-field" required /></div>';
                        html += '<button type="submit" class="btn-primary-blue">Добавить предмет</button>';
                        html += '</form>';
                        html += '<p id="subjectMessage" class="mt-2 text-sm"></p>';

                        $('#subjectManagementContent').html(html);
                    } else {
                        $('#subjectManagementContent').html(`<p class="text-red-500">${response.message}</p>`);
                    }
                },
                error: function() {
                    $('#subjectManagementContent').html('<p class="text-red-500">Ошибка загрузки данных</p>');
                }
            });
        });

        // Добавление класса (делегирование)
        $(document).on('submit', '#addClassForm', function(e) {
            e.preventDefault();
            const formData = $(this).serialize();

            $.ajax({
                url: '/users/add-class',
                type: 'POST',
                data: formData,
                success: function(response) {
                    if (response.success) {
                        $('#classMessage').text(response.message).css('color', 'green');
                        setTimeout(() => location.reload(), 1000);
                    } else {
                        $('#classMessage').text(response.message).css('color', 'red');
                    }
                },
                error: function() {
                    $('#classMessage').text('Ошибка сети').css('color', 'red');
                }
            });
        });

        // Удаление класса
        $(document).on('click', '.delete-class', function() {
            const classId = $(this).data('id');
            if (confirm('Вы уверены, что хотите удалить этот класс?')) {
                $.ajax({
                    url: '/users/delete-class',
                    type: 'POST',
                    data: { classId: classId },
                    success: function(response) {
                        if (response.success) {
                            alert(response.message);
                            location.reload();
                        } else {
                            alert('Ошибка: ' + response.message);
                        }
                    },
                    error: function() {
                        alert('Ошибка сети');
                    }
                });
            }
        });

        // Добавление предмета
        $(document).on('submit', '#addSubjectForm', function(e) {
            e.preventDefault();
            const formData = $(this).serialize();

            $.ajax({
                url: '/users/add-subject',
                type: 'POST',
                data: formData,
                success: function(response) {
                    if (response.success) {
                        $('#subjectMessage').text(response.message).css('color', 'green');
                        setTimeout(() => location.reload(), 1000);
                    } else {
                        $('#subjectMessage').text(response.message).css('color', 'red');
                    }
                },
                error: function() {
                    $('#subjectMessage').text('Ошибка сети').css('color', 'red');
                }
            });
        });

        // Удаление предмета
        $(document).on('click', '.delete-subject', function() {
            const subjectId = $(this).data('id');
            if (confirm('Вы уверены, что хотите удалить этот предмет?')) {
                $.ajax({
                    url: '/users/delete-subject',
                    type: 'POST',
                    data: { subjectId: subjectId },
                    success: function(response) {
                        if (response.success) {
                            alert(response.message);
                            location.reload();
                        } else {
                            alert('Ошибка: ' + response.message);
                        }
                    },
                    error: function() {
                        alert('Ошибка сети');
                    }
                });
            }
        });

        // Закрытие модальных окон
        $('.close-modal').on('click', function() {
            $(this).closest('.modal-overlay').fadeOut(300, function() {
                $(this).addClass('hidden');
            });
        });

        // Закрытие по клику вне окна
        $(window).on('click', function(event) {
            if ($(event.target).is('.modal-overlay')) {
                $(event.target).fadeOut(300, function() {
                    $(this).addClass('hidden');
                });
            }
        });

        // Закрытие по клавише Escape
        $(document).on('keydown', function(event) {
            if (event.key === 'Escape') {
                $('.modal-overlay:visible').fadeOut(300, function() {
                    $(this).addClass('hidden');
                });
            }
        });
    });
    /*]]>*/
</script>
</body>
</html>
