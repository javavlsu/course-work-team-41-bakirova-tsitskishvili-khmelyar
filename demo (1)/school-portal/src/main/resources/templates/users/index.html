<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/users.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аднимистрирование</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.3/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<meta name="_csrf" th:content="${_csrf.token}"/>
<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
<div class="admin-page-content">

    <!-- Сообщения об успехе/ошибке -->
    <div th:if="${successMessage}" class="alert alert-success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Блок управления -->
    <div class="admin-header-bar">
        <a th:href="@{/users/create}" class="btn-create-user">
            <i class="fas fa-plus"></i> Создать нового пользователя
        </a>

        <form th:action="@{/users/index}" method="get" class="filter-search-form">
            <select name="roleFilter" class="filter-field">
                <option value="">Все роли</option>
                <option th:each="role : ${availableRoles}"
                        th:value="${role.name}"
                        th:text="${role.nameRu}"
                        th:selected="${role.name == roleFilter}">
                </option>
            </select>

            <select name="classFilter" class="filter-field">
                <option value="">Все классы</option>
                <option th:each="schoolClass : ${schoolClasses}"
                        th:value="${schoolClass.classId}"
                        th:text="${schoolClass.className}"
                        th:selected="${schoolClass.classId == classFilter}">
                </option>
            </select>

            <input type="text" name="searchTerm" th:value="${searchTerm}"
                   placeholder="Поиск по ФИО..." class="search-field" />

            <button type="submit" class="btn-filter-apply">Применить</button>
            <a th:href="@{/users/index}" class="btn-filter-reset">Сброс</a>
        </form>
    </div>

    <!-- Список пользователей -->
    <div class="user-list-container">
        <div th:if="${users == null || users.isEmpty()}">
            <p class="empty-list-message">
                <i class="fas fa-user-slash fa-2x"></i><br>
                Пользователи не найдены по заданным критериям.
            </p>
        </div>

        <div th:if="${users != null && !users.isEmpty()}">
            <div th:each="user : ${users}" class="user-row">
                <div class="user-info">
                    <span class="user-name" th:text="${user.fullName}">Иванов Иван Иванович</span>
                    <span class="user-role-badge" th:text="${user.roleNameRu}">Учитель</span>
                </div>

                <div class="user-actions">
                    <div th:if="${#authorization.expression('hasRole(''DIRECTOR'')') or #authorization.expression('hasRole(''ADMIN'')')}">
                        <button type="button" class="btn-action btn-edit js-edit-user"
                                th:attr="data-id=${user.userId}">
                            <i class="fas fa-edit"></i> Редактировать
                        </button>

                        <button type="button" class="btn-action btn-delete js-delete-user"
                                th:attr="data-id=${user.userId}, data-name=${user.fullName}">
                            <i class="fas fa-trash"></i> Удалить
                        </button>
                    </div>

                    <button type="button" class="btn-action btn-details js-details-user"
                            th:attr="data-id=${user.userId}">
                        <i class="fas fa-info-circle"></i> Подробнее
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно "Подробная информация" -->
<div id="userDetailsModal" class="modal-overlay" style="display: none;">
    <div class="modal-content-details">
        <div class="modal-form-header">
            Подробная информация о пользователе
        </div>
        <div id="userDetailsContent" class="details-content-area">
            Загрузка...
        </div>
        <div class="modal-form-actions">
            <button type="button" id="closeDetailsModal" class="btn-secondary">Закрыть</button>
        </div>
    </div>
</div>

<!-- Модальное окно "Редактирование пользователя" -->
<div id="editUserModal" class="modal-overlay" style="display: none;">
    <div class="modal-content-details">
        <div class="modal-form-header">
            Редактирование пользователя
        </div>
        <div id="editUserContent" class="details-content-area">
            Загрузка...
        </div>
        <div class="modal-form-actions">
            <button type="button" id="closeEditModal" class="btn-secondary">Отмена</button>
            <button type="button" id="saveEditUser" class="btn-primary">Сохранить</button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    const isAdmin = /*[[${isAdmin}]]*/ false;

    function showModal(modalId) {
        var modal = $('#' + modalId);
        console.log("Показываем модальное окно:", modalId);
        modal.css('display', 'flex');
        modal.show();
    }

    function hideModal(modalId) {
        $('#' + modalId).fadeOut(200);
    }

    $(document).ready(function() {
        // Получаем CSRF токен
        const csrfToken = $('meta[name="_csrf"]').attr('content');
        const csrfHeader = $('meta[name="_csrf_header"]').attr('content');

        // Настраиваем AJAX для всех запросов
        $.ajaxSetup({
            beforeSend: function(xhr, settings) {
                if (settings.type === 'POST' || settings.type === 'PUT' || settings.type === 'DELETE') {
                    if (csrfToken && csrfHeader) {
                        xhr.setRequestHeader(csrfHeader, csrfToken);
                    }
                }
            }
        });

        // Получение деталей пользователя
        $(document).on('click', '.js-details-user', function() {
            const userId = $(this).data('id');
            console.log("Нажата кнопка Подробнее, userId:", userId);

            if (!userId) {
                console.error("userId не найден!");
                return;
            }

            $('#userDetailsModal').css('display', 'flex').show();
            console.log("Открываем модальное окно userDetailsModal");
            $('#userDetailsContent').html('<p style="text-align:center"><i class="fas fa-spinner fa-spin"></i> Загрузка...</p>');

            $.ajax({
                url: '/users/get-user-details',
                type: 'GET',
                data: { id: userId },
                success: function(response) {
                    console.log("Ответ от сервера:", response);
                    if (response.success) {
                        const user = response.user;
                        let passwordHtml = '';
                        if (isAdmin && user.password) {
                            passwordHtml = `<p><strong>Пароль (зашифрован):</strong> ${escapeHtml(user.password)}</p>`;
                        }
                        let html = `
                            <div>
                                <h4 style="margin-bottom: 15px;">${escapeHtml(user.fullName)}</h4>
                                <p><strong>Роль:</strong> ${escapeHtml(user.role)}</p>
                                <p><strong>Логин:</strong> ${escapeHtml(user.username)}</p>
                                ${passwordHtml}
                                <p><strong>Email:</strong> ${escapeHtml(user.email || 'Не указан')}</p>
                                <p><strong>Телефон:</strong> ${escapeHtml(user.phone || 'Не указан')}</p>
                                <p><strong>Дата рождения:</strong> ${escapeHtml(user.birthDate || 'Не указана')}</p>
                                <p><strong>Монеты:</strong> ${user.coins || 0}</p>
                                ${user.info ? `<p><strong>Дополнительная информация:</strong><br>${escapeHtml(user.info)}</p>` : ''}
                            </div>
                        `;
                        $('#userDetailsContent').html(html);
                    } else {
                        $('#userDetailsContent').html(`<p style="color: red;">${escapeHtml(response.message)}</p>`);
                    }
                },
                error: function(xhr, status, error) {
                    console.error("Ошибка AJAX:", status, error);
                    console.error("Ответ:", xhr.responseText);
                    $('#userDetailsContent').html('<p style="color: red;">Ошибка загрузки данных: ' + error + '</p>');
                }
            });
        });

        // Редактирование пользователя
        $(document).on('click', '.js-edit-user', function() {
            const userId = $(this).data('id');
            console.log("Нажата кнопка Редактировать, userId:", userId);

            if (!userId) {
                console.error("userId не найден!");
                return;
            }

            $('#editUserModal').css('display', 'flex').show();
            console.log("Открываем модальное окно editUserModal");
            $('#editUserContent').html('<p style="text-align:center"><i class="fas fa-spinner fa-spin"></i> Загрузка...</p>');

            $.ajax({
                url: '/users/get-user-details',
                type: 'GET',
                data: { id: userId },
                success: function(response) {
                    console.log("Ответ от сервера (редактирование):", response);
                    if (response.success) {
                        const user = response.user;

                        // Разбираем ФИО
                        const nameParts = user.fullName ? user.fullName.split(' ') : [];
                        const lastName = nameParts[0] || '';
                        const firstName = nameParts[1] || '';
                        const middleName = nameParts[2] || '';

                        let passwordField = '';
                        if (isAdmin) {
                            passwordField = `
                                <div class="form-group">
                                    <label>Новый пароль (оставьте пустым, чтобы не менять)</label>
                                    <input type="text" name="password" class="form-control" placeholder="Введите новый пароль" />
                                </div>
                            `;
                        }

                        let html = `
                            <form id="editUserForm">
                                <input type="hidden" name="userId" value="${user.userId}" />

                                <div class="form-group">
                                    <label>Фамилия *</label>
                                    <input type="text" name="lastName" class="form-control" value="${escapeHtml(lastName)}" required />
                                </div>

                                <div class="form-group">
                                    <label>Имя *</label>
                                    <input type="text" name="firstName" class="form-control" value="${escapeHtml(firstName)}" required />
                                </div>

                                <div class="form-group">
                                    <label>Отчество</label>
                                    <input type="text" name="middleName" class="form-control" value="${escapeHtml(middleName)}" />
                                </div>

                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" name="email" class="form-control" value="${escapeHtml(user.email || '')}" />
                                </div>

                                <div class="form-group">
                                    <label>Телефон</label>
                                    <input type="tel" name="phone" class="form-control" value="${escapeHtml(user.phone || '')}" />
                                </div>

                                <div class="form-group">
                                    <label>Дата рождения</label>
                                    <input type="date" name="birthDate" class="form-control" value="${user.birthDate || ''}" />
                                </div>

                                ${passwordField}

                                <div class="form-group">
                                    <label>Дополнительная информация</label>
                                    <textarea name="info" class="form-control" rows="3">${escapeHtml(user.info || '')}</textarea>
                                </div>
                            </form>
                        `;
                        $('#editUserContent').html(html);
                    } else {
                        $('#editUserContent').html(`<p style="color: red;">${escapeHtml(response.message)}</p>`);
                    }
                },
                error: function(xhr, status, error) {
                    console.error("Ошибка AJAX (редактирование):", status, error);
                    $('#editUserContent').html('<p style="color: red;">Ошибка загрузки формы: ' + error + '</p>');
                }
            });
        });

        // Сохранение редактирования
        $(document).on('click', '#saveEditUser', function() {
            const formData = $('#editUserForm').serialize();
            console.log("Сохранение данных:", formData);

            $.ajax({
                url: '/users/edit-user',
                type: 'POST',
                data: formData,
                success: function(response) {
                    console.log("Ответ на сохранение:", response);
                    if (response.success) {
                        alert(response.message);
                        hideModal('editUserModal');
                        location.reload();
                    } else {
                        alert('Ошибка: ' + response.message);
                    }
                },
                error: function(xhr, status, error) {
                    console.error("Ошибка сохранения:", status, error);
                    alert('Ошибка сети: ' + error);
                }
            });
        });

        // Удаление пользователя
        $(document).on('click', '.js-delete-user', function() {
            const userId = $(this).data('id');
            const userName = $(this).data('name');

            if (confirm(`Вы уверены, что хотите удалить пользователя ${userName}?`)) {
                console.log("Удаление пользователя ID:", userId);
                $.ajax({
                    url: '/users/delete',
                    type: 'POST',
                    data: { id: userId },
                    success: function(response) {
                        console.log("Ответ на удаление:", response);
                        if (response.success) {
                            alert(response.message);
                            location.reload();
                        } else {
                            alert('Ошибка: ' + response.message);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error("Ошибка удаления:", status, error);
                        alert('Ошибка сети: ' + error);
                    }
                });
            }
        });

        // Закрытие модальных окон
        $(document).on('click', '#closeDetailsModal, #closeEditModal', function() {
            const modal = $(this).closest('.modal-overlay');
            modal.fadeOut(200);
        });

        // Закрытие по клику вне окна
        $(document).on('click', '.modal-overlay', function(e) {
            if (e.target === this) {
                $(this).fadeOut(200);
            }
        });

        // Закрытие по клавише ESC
        $(document).on('keydown', function(e) {
            if (e.key === 'Escape') {
                $('.modal-overlay:visible').fadeOut(200);
            }
        });
    });

    // Функция для экранирования HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    /*]]>*/
</script>
</body>
</html>
