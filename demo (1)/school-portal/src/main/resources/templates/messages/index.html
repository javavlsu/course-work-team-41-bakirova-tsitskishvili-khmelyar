<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщения</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/messages.css}">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.3/themes/base/jquery-ui.css">
</head>
<body>
<div class="messages-page-content">
    <!-- Сообщения об успехе/ошибке -->
    <div th:if="${param.success != null}" class="alert-success">
        <i class="fas fa-check-circle me-2"></i> Операция выполнена успешно
    </div>
    <div th:if="${param.error != null}" class="alert-error">
        <i class="fas fa-exclamation-circle me-2"></i> Произошла ошибка
    </div>

    <a href="#" id="openNewMessageModal" class="btn-new-message">
        <i class="fas fa-plus"></i> Новое сообщение
    </a>

    <div class="message-content-box">
        <div class="message-tabs-header">
            <a th:href="@{/messages/index(filter='inbox')}"
               th:classappend="${filter == 'inbox'} ? 'message-tab active' : 'message-tab'">
                Входящие
            </a>

            <a th:href="@{/messages/index(filter='sent')}"
               th:classappend="${filter == 'sent'} ? 'message-tab active' : 'message-tab'">
                Отправленные
            </a>

            <a th:href="@{/messages/index(filter='elect')}"
               th:classappend="${filter == 'elect'} ? 'message-tab active' : 'message-tab'">
                Избранное
            </a>
        </div>

        <div class="message-list-container">
            <div th:if="${messages == null || messages.isEmpty()}">
                <p class="empty-list-message">
                    Нет
                    <span th:if="${filter == 'inbox'}">входящих</span>
                    <span th:if="${filter == 'sent'}">отправленных</span>
                    <span th:if="${filter == 'elect'}">избранных</span>
                    сообщений.
                </p>
            </div>

            <div th:if="${messages != null && !messages.isEmpty()}">
                <div class="message-list-header">
                    <div class="message-header-fio">
                        <span th:text="${filter == 'inbox' || filter == 'elect'} ? 'Отправитель' : 'Получатель'"></span>
                    </div>
                    <div class="message-header-text">Сообщение</div>
                    <div class="message-header-status">Статус</div>
                    <div class="message-header-actions">Действия</div>
                </div>

                <div th:each="message : ${messages}"
                     th:classappend="${filter == 'inbox' && message.status.name() == 'NEW'} ? 'message-row unread' : 'message-row'">

                    <div class="message-user">
                        <span th:if="${filter == 'inbox' || filter == 'elect'}" th:with="u=${message.fromUser}">
                            <b th:text="${u != null ? u.fullName : 'Неизвестно'}"></b>
                            <span class="role-badge" th:if="${u != null}"
                                  th:text="${'(' + (u.role.roleName == 'TEACHER' ? 'Учитель' :
                                                   u.role.roleName == 'STUDENT' ? 'Ученик' :
                                                   u.role.roleName == 'DIRECTOR' ? 'Директор' :
                                                   u.role.roleName == 'ADMIN' ? 'Админ' : u.role.roleName) + ')'}">
                            </span>
                        </span>
                                            <span th:unless="${filter == 'inbox' || filter == 'elect'}" th:with="u=${message.toUser}">
                            <b th:text="${u != null ? u.fullName : 'Неизвестно'}"></b>
                            <span class="role-badge" th:if="${u != null}"
                                  th:text="${'(' + (u.role.roleName == 'TEACHER' ? 'Учитель' :
                                                   u.role.roleName == 'STUDENT' ? 'Ученик' :
                                                   u.role.roleName == 'DIRECTOR' ? 'Директор' :
                                                   u.role.roleName == 'ADMIN' ? 'Админ' : u.role.roleName) + ')'}">
                            </span>
                        </span>
                    </div>

                    <div class="message-snippet">
                        <span th:text="${message.messageText}"></span>
                    </div>

                    <div class="message-status">
                        <span th:switch="${message.status.name()}">
                            <span th:case="'NEW'" class="status-new">Новое</span>
                            <span th:case="'READ'" class="status-read">Прочитано</span>
                            <span th:case="'ELECT'" class="status-elect">Избранное</span>
                        </span>
                    </div>

                    <div class="message-actions">
                        <!-- Для входящих сообщений -->
                        <div th:if="${filter == 'inbox'}">
                            <!-- Кнопка Ответить -->
                            <button type="button" class="btn-action btn-reply"
                                    th:data-user-id="${message.fromUser != null ? message.fromUser.userId : 0}"
                                    th:data-user-name="${message.fromUser != null ? message.fromUser.fullName : 'Неизвестно'}">
                                Ответить
                            </button>

                            <!-- Кнопка Прочитано (только для новых) -->
                            <form th:if="${message.status.name() == 'NEW'}"
                                  th:action="@{/messages/mark-as-read}"
                                  method="post" class="inline-form-action">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <input type="hidden" name="id" th:value="${message.messageId}" />
                                <button type="submit" class="btn-action btn-read">Прочитать</button>
                            </form>

                            <!-- Кнопка Добавить в избранное (только для прочитанных) -->
                            <form th:if="${message.status.name() == 'READ'}"
                                  th:action="@{/messages/elect}"
                                  method="post" class="inline-form-action">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <input type="hidden" name="id" th:value="${message.messageId}" />
                                <button type="submit" class="btn-action btn-elect">В избранное</button>
                            </form>
                        </div>

                        <!-- Для отправленных сообщений -->
                        <div th:if="${filter == 'sent'}">
                            <!-- Кнопка Удалить (только для новых) -->
                            <form th:if="${message.status.name() == 'NEW'}"
                                  th:action="@{/messages/delete}"
                                  method="post" class="inline-form-action">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <input type="hidden" name="id" th:value="${message.messageId}" />
                                <button type="submit" class="btn-action btn-delete"
                                        onclick="return confirm('Вы уверены, что хотите удалить это сообщение?');">
                                    Удалить
                                </button>
                            </form>
                        </div>

                        <!-- Для избранного -->
                        <div th:if="${filter == 'elect'}">
                            <!-- Кнопка Убрать из избранного -->
                            <form th:action="@{/messages/restore}"
                                  method="post" class="inline-form-action">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <input type="hidden" name="id" th:value="${message.messageId}" />
                                <button type="submit" class="btn-action btn-restore">Убрать из избранного</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно нового сообщения -->
<div id="newMessageModal" class="message-modal-overlay">
    <div class="message-modal-content">
        <div class="message-modal-header">
            Новое сообщение
        </div>

        <form id="messageForm" method="post" th:action="@{/messages/create}" class="message-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="recipientId" id="hiddenToUserId" required />

            <select id="recipientRole" class="form-input-field recipient-input">
                <option value="" selected>Все пользователи (поиск по ФИО)</option>
                <option th:each="role : ${recipientRoles}"
                        th:value="${role}"
                        th:text="${role == 'TEACHER' ? 'Учитель' :
                    (role == 'STUDENT' ? 'Ученик' :
                    (role == 'DIRECTOR' ? 'Директор' :
                    (role == 'PARENT' ? 'Родитель' :
                    (role == 'ADMIN' ? 'Администратор' : role))))}">
                </option>
            </select>

            <input type="hidden" name="parentMessageId" id="parentMessageId" />
            <input type="text" id="recipientSearch" name="recipientName"
                   class="form-input-field recipient-input"
                   placeholder="Начните вводить ФИО..."
                   disabled required>
            <div id="recipientValidationMessage" class="validation-message"></div>

            <textarea id="messageText" name="body"
                      class="form-textarea-field"
                      placeholder="Текст сообщения"
                      rows="6" required></textarea>

            <div class="message-modal-actions">
                <button type="button" id="closeNewMessageModal" class="btn btn-secondary-text">Отмена</button>
                <button type="submit" id="sendMessageButton" class="btn btn-primary-blue" disabled>Отправить</button>
            </div>
        </form>
    </div>
</div>

<!-- Подключение jQuery и jQuery UI -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.3/jquery-ui.min.js"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    $(document).ready(function() {
        const modal = $('#newMessageModal');
        const openNewMsgBtn = $('#openNewMessageModal');
        const closeBtn = $('#closeNewMessageModal');
        const replyButtons = $('.btn-reply');

        const roleSelect = $('#recipientRole');
        const searchInput = $('#recipientSearch');
        const validationMsg = $('#recipientValidationMessage');
        const sendButton = $('#sendMessageButton');
        const hiddenToUserId = $('#hiddenToUserId');
        const messageTextarea = $('#messageText');
        const messageForm = $('#messageForm');

        // Инициализируем autocomplete один раз при загрузке страницы
        initAutocomplete();

        function prepareModal(isReply = false, userId = '', userName = '', messageId = '') {
            // Сброс формы вручную, чтобы не затереть hidden поля сразу
            messageForm[0].reset();
            hiddenToUserId.val('');
            $('#parentMessageId').val('');

            validationMsg.text('');
            validationMsg.removeClass('text-green-500 text-red-500 text-gray-500');
            messageTextarea.val('');

            if (isReply) {
                $('#parentMessageId').val(messageId);
                hiddenToUserId.val(userId);
                searchInput.val(userName);

                searchInput.prop('readonly', true).prop('disabled', false);
                roleSelect.prop('disabled', true);

                validationMsg.text('Ответ пользователю: ' + userName).addClass('text-green-500');
            } else {
                // Режим нового сообщения
                roleSelect.prop('disabled', false).val('');
                searchInput.prop('readonly', false).prop('disabled', false).val('');
                validationMsg.text('Начните вводить ФИО...').addClass('text-gray-500');
            }

            checkFormValidity();
            modal.css('display', 'flex');
        }

        function checkFormValidity() {
            const hasRecipient = hiddenToUserId.val() !== '';
            const hasText = messageTextarea.val().trim().length > 0;
            sendButton.prop('disabled', !(hasRecipient && hasText));
        }

        function initAutocomplete() {
            // Если autocomplete уже был инициализирован, не нужно его уничтожать,
            // он сам подхватит изменения roleSelect.val() при запросе
            if (searchInput.data("ui-autocomplete")) return;

            searchInput.autocomplete({
                source: function(request, response) {
                    const role = roleSelect.val() || ""; // Если null, отправляем пустую строку

                    validationMsg.text('Поиск...').removeClass('text-red-500 text-green-500').addClass('text-gray-500');

                    $.ajax({
                        url: '/messages/search-user',
                        dataType: "json",
                        data: {
                            fullName: request.term,
                            role: role
                        },
                        success: function(data) {
                            if (data && data.length > 0) {
                                validationMsg.text('Выберите из списка').addClass('text-gray-500');
                                response($.map(data, function(item) {
                                    return {
                                        label: item.fullName,
                                        value: item.fullName,
                                        userId: item.userId
                                    };
                                }));
                            } else {
                                validationMsg.text('Пользователи не найдены').addClass('text-red-500');
                                response([]);
                            }
                        },
                        error: function() {
                            validationMsg.text('Ошибка сервера').addClass('text-red-500');
                        }
                    });
                },
                minLength: 1,
                select: function(event, ui) {
                    hiddenToUserId.val(ui.item.userId);
                    searchInput.val(ui.item.value);
                    validationMsg.text('Получатель выбран').removeClass('text-gray-500').addClass('text-green-500');
                    checkFormValidity();
                    return false;
                }
            });
        }

        // Обработчики
        openNewMsgBtn.on('click', function(e) { e.preventDefault(); prepareModal(false); });
        closeBtn.on('click', function(e) { e.preventDefault(); modal.hide(); });

        roleSelect.on('change', function() {
            hiddenToUserId.val('');
            searchInput.val('').focus();
            checkFormValidity();
        });

        searchInput.on('input', function() {
            if (!$(this).prop('readonly')) {
                hiddenToUserId.val('');
                checkFormValidity();
            }
        });

        messageTextarea.on('input', checkFormValidity);

        replyButtons.on('click', function(e) {
            e.preventDefault();
            const btn = $(this);
            prepareModal(true, btn.data('user-id'), btn.data('user-name'), btn.closest('.message-row').find('input[name="id"]').val());
        });

        $(window).on('click', function(e) { if ($(e.target).is(modal)) modal.hide(); });
    });
    /*]]>*/
</script>
</body>
</html>
