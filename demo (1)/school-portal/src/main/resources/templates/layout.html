<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - ШкЭД'">ШкЭД</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Наши стили -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<!-- Если авторизован - показываем макет -->
<div sec:authorize="isAuthenticated()">
    <div class="container-fluid">
        <div class="row">
            <!-- Боковое меню -->
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar" style="max-width: 250px">
                <div class="position-sticky">
                    <div class="sidebar-heading">
                        <h3 class="text-primary fw-bold" style="color: #3b90d3 !important">ШкЭД</h3>
                        <small class="text-muted">Школьный портал</small>
                    </div>

                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/}"
                               th:classappend="${activePage == 'home'} ? 'active'">
                                <i class="fas fa-home me-2"></i>
                                Главная
                            </a>
                        </li>

                        <!-- Для учителей и директоров -->
                        <li class="nav-item" sec:authorize="hasAnyRole('TEACHER', 'DIRECTOR', 'ADMIN')">
                            <a class="nav-link" th:href="@{/journal/index}"
                               th:classappend="${activePage == 'journal'} ? 'active' : ''">
                                <i class="fas fa-book me-2"></i>
                                Ведение журнала
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/grades}"
                               th:classappend="${activePage == 'grades'} ? 'active'">
                                <i class="fas fa-chart-line me-2"></i>
                                <span>Успеваемость</span>
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/messages/index}"
                               th:classappend="${activePage == 'messages'} ? 'active' : ''">
                                <i class="fas fa-envelope me-2"></i>
                                Сообщения
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/schedule/index}"
                               th:classappend="${activePage == 'schedule'} ? 'active' : ''">
                                <i class="fas fa-calendar-alt me-2"></i>
                                Расписание
                            </a>
                        </li>

                        <!-- Для учителей -->
                        <li class="nav-item" sec:authorize="hasRole('TEACHER')">
                            <a class="nav-link" th:href="@{/homework/review}"
                               th:classappend="${activePage == 'homework'} ? 'active'">
                                <i class="fas fa-clipboard-check me-2"></i>
                                <span>Проверка ДЗ</span>
                            </a>
                        </li>

                        <!-- Магазин (видят все, покупают ученики) -->
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/merch}"
                               th:classappend="${activePage == 'merch'} ? 'active'">
                                <i class="fas fa-store me-2"></i>
                                <span>Магазин мерча</span>
                            </a>
                        </li>

                        <!-- Для учителей и директоров -->
                        <li class="nav-item" sec:authorize="hasAnyRole('DIRECTOR', 'TEACHER', 'ADMIN')">
                            <a class="nav-link" th:href="@{/users/index}"
                               th:classappend="${activePage == 'users'} ? 'active' : ''">
                                <i class="fas fa-users-cog me-2"></i>
                                <span>Управление пользователями</span>
                            </a>
                        </li>

                        <hr class="my-3">

                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/profile/index}"
                               th:classappend="${activePage == 'profile'} ? 'active' : ''">
                                <i class="fas fa-user-circle me-2"></i>
                                Профиль
                            </a>
                        </li>
                    </ul>

                    <div class="mt-auto p-3">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="btn btn-outline-danger w-100">
                                <i class="fas fa-sign-out-alt me-2"></i>
                                Выйти
                            </button>
                        </form>
                    </div>
                </div>
            </nav>

            <!-- Основной контент -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
                    <h1 class="h2" th:text="${title}">Заголовок</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <div class="text-muted" style="text-align: right">
                            Приветствуем,
                            <!-- Выводим метод getFullName() из класса User -->
                            <strong th:text="${currentUser.fullName}">Пользователь</strong>!
                            Вы вошли в систему как
                            <strong>
                                <!-- Переводим системные роли на русский язык -->
                                <span th:if="${currentUser.role.roleName == 'DIRECTOR'}">директор</span>
                                <span th:if="${currentUser.role.roleName == 'TEACHER'}">учитель</span>
                                <span th:if="${currentUser.role.roleName == 'STUDENT'}">ученик</span>
                                <span th:if="${currentUser.role.roleName == 'PARENT'}">родитель</span>
                                <span th:if="${currentUser.role.roleName == 'ADMIN'}">администратор</span>
                            </strong>
                            <span th:if="${currentUser.role.roleName == 'STUDENT'}">
                                <br>
                                <strong>Баланс монет:</strong> <span th:text="${currentUser.coins}"></span>
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Контент страницы -->
                <div th:replace="${content}"></div>
            </main>
        </div>
    </div>
</div>

<!-- Если не авторизован - редирект -->
<div sec:authorize="!isAuthenticated()">
    <script>
        window.location.href = "/login";
    </script>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Наши скрипты -->
<script th:inline="javascript">
    /*<![CDATA[*/
        // Универсальные функции управления окнами
        window.showModal = function() {
            const modal = document.getElementById('announcementModal');
            if (modal) modal.style.display = 'flex';
        };

        window.hideModal = function() {
            const modal = document.getElementById('announcementModal');
            if (modal) modal.style.display = 'none';
        };

        // Функция для КРАСИВОГО уведомления
        window.showStatus = function(title, message, isSuccess) {
            const sModal = document.getElementById('statusModal');
            const sTitle = document.getElementById('statusTitle');
            const sMsg = document.getElementById('statusMessage');
            const sBtn = document.getElementById('closeStatusModal');

            if (!sModal) return; // Если окна нет на странице, ничего не делаем

            sTitle.textContent = title;
            sMsg.textContent = message;
            sTitle.style.color = isSuccess ? '#1e40af' : '#dc3545';
            sModal.style.display = 'flex';

            sBtn.onclick = function() {
                sModal.style.display = 'none';
                if (isSuccess) window.location.reload();
            };
        };

        // Закрытие по клику вне окна (для обоих окон)
        document.addEventListener('click', function(event) {
            const annModal = document.getElementById('announcementModal');
            const statModal = document.getElementById('statusModal');
            if (event.target === annModal) window.hideModal();
            if (event.target === statModal) statModal.style.display = 'none';
        });

        // Обработка отправки (ЕДИНСТВЕННЫЙ обработчик здесь)
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('announcementForm');
            if (form) {
                form.addEventListener('submit', async function(event) {
                    event.preventDefault();

                    const submitButton = form.querySelector('button[type="submit"]');
                    const originalText = submitButton.innerHTML;

                    submitButton.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Публикуется...';
                    submitButton.disabled = true;

                    try {
                        const response = await fetch(form.action, {
                            method: 'POST',
                            body: new FormData(form)
                        });

                        // ПРОВЕРКА: Если статус 200-299, значит в БД всё записалось!
                        if (response.ok) {
                            window.hideModal();
                            form.reset();

                            // Пытаемся прочитать сообщение от сервера, если оно есть
                            let message = 'Объявление успешно опубликовано';
                            try {
                                const result = await response.json();
                                if (result.message) message = result.message;
                            } catch (e) {
                                // Если сервер прислал не JSON, просто игнорируем и оставляем стандартный текст
                            }

                            // Показываем наше голубое окно успеха
                            window.showStatus('Публикация!', message, true);
                        } else {
                            window.showStatus('Ошибка', 'Сервер вернул ошибку: ' + response.status, false);
                        }
                    } catch (error) {
                        // Если мы попали сюда, значит была ошибка в самом коде JS или сети
                        console.error('Ошибка исполнения:', error);
                        // На всякий случай проверяем: если запись все же дошла, не пугаем пользователя
                        window.showStatus('Внимание', 'Запрос отправлен, проверьте список объявлений.', true);
                    } finally {
                        submitButton.innerHTML = originalText;
                        submitButton.disabled = false;
                    }
                });
            }
        });
    /*]]>*/
</script>
</body>
</html>
