<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <style>
    .amount-positive {
        color: #166534;
        font-weight: bold;
    }
    .amount-negative {
        color: #dc2626;
        font-weight: bold;
    }
    .dash-grade {
        color: #adb5bd;
        font-weight: bold;
    }
  </style>
</head>
<body>

<div>
  <!-- Кнопка возврата в магазин -->
  <div class="mb-4">
    <a th:href="@{/merch}" class="btn btn-light border shadow-sm" style="border-radius: 8px;">
      <i class="fas fa-arrow-left me-2"></i> Вернуться в магазин
    </a>
  </div>

  <!-- Таблица истории операций -->
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-bordered table-hover mb-0">
          <thead class="table-primary">
          <tr>
            <th style="width: 50px;" class="text-center">№</th>
            <th style="width: 160px;">Дата и время</th>
            <th>Описание операции</th>
            <th style="width: 120px;" class="text-center">Монеты</th>
            <th style="width: 160px;" class="text-center">Статус выдачи</th>
          </tr>
          </thead>
          <tbody>

          <!-- Если история пуста -->
          <tr th:if="${transactions.isEmpty()}">
            <td colspan="5" class="text-center py-4 text-muted">
              <i class="fas fa-history fa-2x mb-2"></i><br>
              История операций пока пуста
            </td>
          </tr>

          <!-- Итерация по транзакциям -->
          <tr th:each="tx, stat : ${transactions}">
            <td class="text-center" th:text="${stat.count}">1</td>

            <!-- Форматируем дату (DD.MM.YYYY HH:mm) -->
            <td th:text="${#temporals.format(tx.date, 'dd.MM.yyyy HH:mm')}">01.09.2025 08:00</td>

            <td th:text="${tx.description}">Покупка ручки</td>

            <!-- Сумма (с подкраской плюс/минус) -->
            <td class="text-center">
              <span th:classappend="${tx.amount > 0 ? 'amount-positive' : 'amount-negative'}"
                    th:text="${tx.amount > 0 ? '+' + tx.amount : tx.amount}">
                  -50
              </span>
            </td>

            <!-- Статус (только если это покупка мерча) -->
            <td class="text-center">
              <span th:if="${tx.merchRequest != null}">
                  <!-- Статус 0: В обработке -->
                  <span th:if="${tx.merchRequest.status == 0}" class="badge bg-warning text-dark">
                      <i class="fas fa-clock"></i> В обработке
                  </span>
                <!-- Статус 1: Выдано -->
                  <span th:if="${tx.merchRequest.status == 1}" class="badge bg-success">
                      <i class="fas fa-check-circle"></i> Выдано
                  </span>
                <!-- Статус 2: Отклонено -->
                  <span th:if="${tx.merchRequest.status == 2}" class="badge bg-danger">
                      <i class="fas fa-times-circle"></i> Отклонено
                  </span>
              </span>

              <!-- Если это начисление за урок/оценку, статуса выдачи нет -->
              <span th:unless="${tx.merchRequest != null}" class="dash-grade">—</span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
</html>
