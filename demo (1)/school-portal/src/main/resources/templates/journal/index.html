<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ведение журнала</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/journal.css}">
</head>
<body>
<div class="journal-container">

    <div th:if="${errorMessage}" class="error-message">
        <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${errorMessage}"></span>
    </div>

    <div class="filter-card" th:unless="${errorMessage}">
        <form method="get" th:action="@{/journal/index}" class="filter-form" id="filterForm">
            <div class="filter-group">
                <label>КЛАСС</label>
                <select name="classId" class="filter-select" onchange="this.form.submit()">
                    <option th:each="cls : ${viewModel.classes.entrySet()}"
                            th:value="${cls.key}" th:text="${cls.value}"
                            th:selected="${cls.key == viewModel.selectedClassId}"></option>
                </select>
            </div>
            <div class="filter-group">
                <label>ПРЕДМЕТ</label>
                <select name="subjectId" class="filter-select" onchange="this.form.submit()">
                    <option th:each="subj : ${viewModel.subjects.entrySet()}"
                            th:value="${subj.key}" th:text="${subj.value}"
                            th:selected="${subj.key == viewModel.selectedSubjectId}"></option>
                </select>
            </div>
            <div class="filter-group">
                <label>НЕДЕЛЯ</label>
                <select name="weekStart" class="filter-select" onchange="this.form.submit()">
                    <option th:each="week : ${viewModel.weeks.entrySet()}"
                            th:value="${week.key}" th:text="${week.value}"
                            th:selected="${week.key == viewModel.weekStart.toString()}"></option>
                </select>
            </div>
        </form>

        <div class="week-navigation">
            <div class="d-flex justify-content-between align-items-center">
                <a th:href="@{/journal/index(classId=${viewModel.selectedClassId}, subjectId=${viewModel.selectedSubjectId}, weekStart=${viewModel.prevWeekStart})}"
                   class="btn btn-outline-primary week-nav-btn">
                    <i class="fas fa-chevron-left me-2"></i> Предыдущая неделя
                </a>
                <div class="text-center">
                    <span class="badge-period">
                        <span th:text="${#temporals.format(viewModel.weekStart, 'dd.MM.yyyy')}"></span>
                        -
                        <span th:text="${#temporals.format(viewModel.weekStart.plusDays(6), 'dd.MM.yyyy')}"></span>
                    </span>
                </div>
                <a th:if="${viewModel.nextWeekAvailable}"
                   th:href="@{/journal/index(classId=${viewModel.selectedClassId}, subjectId=${viewModel.selectedSubjectId}, weekStart=${viewModel.nextWeekStart})}"
                   class="btn btn-outline-primary week-nav-btn">
                    Следующая неделя <i class="fas fa-chevron-right ms-2"></i>
                </a>
                <button th:unless="${viewModel.nextWeekAvailable}"
                        class="btn btn-outline-secondary week-nav-btn" disabled>
                    Следующая неделя <i class="fas fa-chevron-right ms-2"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="journal-card" th:unless="${errorMessage}">
        <div class="table-container">
            <table class="journal-table">
                <thead>
                <tr>
                    <th style="min-width: 50px;">№</th>
                    <th style="min-width: 200px;">Ученик</th>
                    <th th:each="lesson : ${viewModel.lessonsForWeek}"
                        class="lesson-header"
                        th:attr="onclick='openLessonModal(' + ${lesson.lessonId} + ')'">
                        <div class="lesson-date" th:text="${lesson.formattedDate}"></div>
                        <div class="lesson-topic-preview">
                            <span th:if="${lesson.lessonTopic != null and !lesson.lessonTopic.isEmpty()}"
                                  th:text="${lesson.lessonTopic.length() > 15 ? lesson.lessonTopic.substring(0,15) + '...' : lesson.lessonTopic}">тема</span>
                            <span th:unless="${lesson.lessonTopic != null and !lesson.lessonTopic.isEmpty()}" class="text-light">нет темы</span>
                        </div>
                        <i th:if="${lesson.homeworkText != null and !lesson.homeworkText.isEmpty()}" class="fas fa-home" style="font-size: 10px;"></i>
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row, stat : ${viewModel.rows}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${row.student.fullName}"></td>
                    <td th:each="lesson : ${viewModel.lessonsForWeek}"
                        class="grade-cell"
                        th:attr="data-student-id=${row.student.userId},
                                 data-lesson-id=${lesson.lessonId},
                                 data-student-name=${row.student.fullName},
                                 data-lesson-date=${lesson.formattedDate},
                                 data-grade=${row.cells[lesson.lessonId]?.value},
                                 data-attendance=${row.cells[lesson.lessonId]?.attendance ? row.cells[lesson.lessonId].value : ''},
                                 data-comment=${row.cells[lesson.lessonId]?.comment},
                                 data-remark=${row.cells[lesson.lessonId]?.remark}">
                        <div th:if="${row.cells[lesson.lessonId] != null}">
                            <span th:if="${row.cells[lesson.lessonId].attendance}"
                                  th:class="'attendance-badge ' +
                                          (${row.cells[lesson.lessonId].value == 'Н'} ? 'attendance-absent' :
                                           (${row.cells[lesson.lessonId].value == 'У'} ? 'attendance-excused' : 'attendance-sick'))"
                                  th:text="${row.cells[lesson.lessonId].value}"></span>
                            <span th:unless="${row.cells[lesson.lessonId].attendance}"
                                  th:class="'grade-value ' +
                                          (${row.cells[lesson.lessonId].value == '5'} ? 'grade-5' :
                                           (${row.cells[lesson.lessonId].value == '4'} ? 'grade-4' :
                                            (${row.cells[lesson.lessonId].value == '3'} ? 'grade-3' : 'grade-2')))"
                                  th:text="${row.cells[lesson.lessonId].value}"></span>
                            <i th:if="${row.cells[lesson.lessonId].hasComment}" class="fas fa-comment-dots comment-icon"
                               th:attr="data-comment=${row.cells[lesson.lessonId].comment}" title="Комментарий"></i>
                            <i th:if="${row.cells[lesson.lessonId].hasRemark}" class="fas fa-exclamation-triangle comment-icon"
                               style="color: #f59e0b;" th:attr="data-remark=${row.cells[lesson.lessonId].remark}" title="Замечание"></i>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${viewModel.rows == null or viewModel.rows.isEmpty()}" class="empty-state">
            <i class="fas fa-chalkboard-user fa-3x mb-3"></i>
            <h5>Нет данных для отображения</h5>
            <p class="text-muted">В этом классе нет учеников или расписание не заполнено</p>
        </div>
    </div>
</div>

<!-- Модальное окно для оценки -->
<div class="modal fade grade-modal" id="gradeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Редактирование</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="student-info-card">
                    <p><strong>Ученик:</strong> <span id="modalStudentName"></span></p>
                    <p><strong>Дата урока:</strong> <span id="modalLessonDate"></span></p>
                </div>
                <form id="gradeForm" method="post" th:action="@{/journal/save-grade}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" id="modalStudentId" name="studentId">
                    <input type="hidden" id="modalLessonId" name="lessonId">
                    <input type="hidden" name="classId" th:value="${viewModel.selectedClassId}">
                    <input type="hidden" name="subjectId" th:value="${viewModel.selectedSubjectId}">
                    <input type="hidden" name="weekStart" th:value="${viewModel.weekStart}">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Оценка</label>
                        <select id="gradeValue" name="gradeValue" class="form-select">
                            <option value="">— Не выбрано —</option>
                            <option value="5">5 - Отлично</option>
                            <option value="4">4 - Хорошо</option>
                            <option value="3">3 - Удовлетворительно</option>
                            <option value="2">2 - Неудовлетворительно</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Посещаемость</label>
                        <select id="attendanceStatus" name="attendanceStatus" class="form-select">
                            <option value="">— Присутствовал —</option>
                            <option value="Н">Н - Отсутствовал (неуважительная)</option>
                            <option value="У">У - Отсутствовал (уважительная)</option>
                            <option value="Б">Б - Болел</option>
                        </select>
                        <small class="text-muted-custom">При выборе посещаемости оценка, комментарий и замечание будут удалены</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Комментарий</label>
                        <textarea id="comment" name="comment" rows="2" class="form-control" placeholder="Комментарий к оценке..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Замечание</label>
                        <textarea id="remark" name="remark" rows="2" class="form-control" placeholder="Замечание ученику..."></textarea>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" id="submitGradeBtn" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для урока -->
<div class="modal fade lesson-modal-centered" id="lessonModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div id="lessonModalContent"></div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/journal.js}"></script>
</body>
</html>
