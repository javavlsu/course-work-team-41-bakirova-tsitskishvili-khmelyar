<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Успеваемость класса</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .global-tooltip {
            position: fixed;
            z-index: 99999;
            background-color: #1f2937;
            color: white;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 350px;
            white-space: normal;
            word-wrap: break-word;
            pointer-events: none;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .global-tooltip.show {
            visibility: visible;
            opacity: 1;
        }
        .tooltip-trigger {
            cursor: help;
            border-bottom: 1px dashed #6c757d;
            display: inline-block;
        }
        .grade-distribution {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #374151;
        }
        .grade-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .grade-5 { color: #10b981; }
        .grade-4 { color: #3b82f6; }
        .grade-3 { color: #f59e0b; }
        .grade-2 { color: #ef4444; }
        .grade-high { color: #10b981; font-weight: bold; }
        .grade-medium { color: #f59e0b; font-weight: bold; }
        .grade-low { color: #ef4444; font-weight: bold; }
        .grade-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: bold;
            margin-right: 0.25rem;
        }
        .grade-badge-5 { background-color: #d1fae5; color: #065f46; }
        .grade-badge-4 { background-color: #dbeafe; color: #1e40af; }
        .grade-badge-3 { background-color: #fed7aa; color: #9a3412; }
        .grade-badge-2 { background-color: #fee2e2; color: #991b1b; }
        .homeroom-badge {
            background-color: #dbeafe;
            color: #1e40af;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4">Успеваемость класса</h2>

    <!-- Сообщение об ошибке -->
    <div th:if="${errorMessage}" class="alert alert-warning mb-4">
        <i class="fas fa-exclamation-triangle me-2"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Фильтры -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <form th:action="@{/grades}" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="classId" class="form-label fw-bold">Класс:</label>
                    <select name="classId" id="classId" class="form-select" onchange="this.form.submit()">
                        <option th:each="cls : ${availableClasses.entrySet()}"
                                th:value="${cls.key}"
                                th:text="${cls.value}"
                                th:selected="${cls.key == selectedClassId}"></option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="subjectId" class="form-label fw-bold">Предмет:</label>
                    <select name="subjectId" id="subjectId" class="form-select" onchange="this.form.submit()">
                        <option th:each="subj : ${availableSubjects.entrySet()}"
                                th:value="${subj.key}"
                                th:text="${subj.value}"
                                th:selected="${subj.key == selectedSubjectId}"></option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="quarter" class="form-label fw-bold">Период:</label>
                    <select name="quarter" id="quarter" class="form-select" onchange="this.form.submit()">
                        <option th:each="q : ${availableQuarters}"
                                th:value="${q}"
                                th:text="${q == 'Итоговые оценки' ? q : q + ' четверть'}"
                                th:selected="${q == selectedQuarter}"></option>
                    </select>
                </div>
            </form>
        </div>
    </div>

    <!-- Информация о выбранных фильтрах -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <small class="text-muted">Выбранный класс</small>
                    <h5 class="mb-0" th:text="${selectedClassName}">9 "А"</h5>
                </div>
                <div class="col-md-6">
                    <small class="text-muted">Выбранный предмет</small>
                    <h5 class="mb-0">
                        <span th:text="${selectedSubjectName}">Математика</span>
                        <span th:if="${isHomeroomTeacher}" class="homeroom-badge">
                            <i class="fas fa-star"></i> Классный руководитель
                        </span>
                    </h5>
                </div>
            </div>
        </div>
    </div>

    <!-- Таблица учеников -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-bordered table-hover mb-0">
                    <thead class="table-primary">
                    <tr>
                        <th style="width: 50px;">№</th>
                        <th>ФИО ученика</th>
                        <th style="width: 120px;">Средний балл</th>
                        <th>Оценки</th>
                        <th style="width: 100px;">Итоговая</th>
                        <th style="width: 80px;">Пропуски</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="student, stat : ${students}">
                        <td class="text-center" th:text="${stat.count}">1</td>
                        <td th:text="${student.fullName}">Иванов Иван</td>
                        <td class="text-center">
                                <span class="tooltip-trigger"
                                      th:classappend="${student.averageGrade >= 4 ? 'grade-high' : (student.averageGrade >= 3 ? 'grade-medium' : 'grade-low')}"
                                      th:text="${#numbers.formatDecimal(student.averageGrade, 1, 2)}"
                                      th:attr="data-type='grades',
                                               data-student=${student.fullName},
                                               data-subject=${selectedSubjectName},
                                               data-average=${#numbers.formatDecimal(student.averageGrade, 1, 2)},
                                               data-grade5=${student.gradeCount5},
                                               data-grade4=${student.gradeCount4},
                                               data-grade3=${student.gradeCount3},
                                               data-grade2=${student.gradeCount2}">0.00</span>
                        </td>
                        <td>
                                <span th:each="grade : ${student.allGrades}"
                                      th:classappend="'grade-badge grade-badge-' + ${grade}"
                                      th:text="${grade}"></span>
                            <span th:if="${student.allGrades.isEmpty()}" class="text-muted">—</span>
                        </td>
                        <td class="text-center">
                                <span th:classappend="${student.quarterFinalGrade >= 4 ? 'grade-high' : (student.quarterFinalGrade >= 3 ? 'grade-medium' : 'grade-low')}"
                                      th:text="${student.quarterFinalGrade > 0 ? student.quarterFinalGrade : '—'}">—</span>
                        </td>
                        <td class="text-center">
                                <span class="tooltip-trigger"
                                      th:classappend="${student.totalAbsences > 0 ? 'text-danger fw-bold' : 'text-muted'}"
                                      th:text="${student.totalAbsences}"
                                      th:attr="data-type='absences',
                                               data-student=${student.fullName},
                                               data-subject=${selectedSubjectName},
                                               data-total=${student.totalAbsences},
                                               data-h=${student.absentTypeH},
                                               data-u=${student.absentTypeU},
                                               data-b=${student.absentTypeB}">0</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Сообщение при отсутствии учеников -->
    <div th:if="${students == null or students.isEmpty()}" class="alert alert-info mt-4 text-center">
        <i class="fas fa-users-slash me-2"></i>
        В выбранном классе нет учеников
    </div>
</div>

<!-- Глобальный тултип -->
<div id="globalTooltip" class="global-tooltip"></div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tooltip = document.getElementById('globalTooltip');
        let activeTrigger = null;

        function buildGradesContent(element) {
            const student = element.getAttribute('data-student') || '';
            const subject = element.getAttribute('data-subject') || '';
            const average = element.getAttribute('data-average') || '0';
            const grade5 = element.getAttribute('data-grade5') || '0';
            const grade4 = element.getAttribute('data-grade4') || '0';
            const grade3 = element.getAttribute('data-grade3') || '0';
            const grade2 = element.getAttribute('data-grade2') || '0';
            const total = parseInt(grade5) + parseInt(grade4) + parseInt(grade3) + parseInt(grade2);

            return `
                <div class="fw-bold mb-2 border-bottom pb-1">Детализация оценок</div>
                <div class="fw-bold mb-2">${student}</div>
                <div class="text-muted mb-2">${subject}</div>
                <div class="grade-stat"><span>Отлично (5):</span> <span class="grade-5 fw-bold">${grade5}</span></div>
                <div class="grade-stat"><span>Хорошо (4):</span> <span class="grade-4 fw-bold">${grade4}</span></div>
                <div class="grade-stat"><span>Удовлетворительно (3):</span> <span class="grade-3 fw-bold">${grade3}</span></div>
                <div class="grade-stat"><span>Неудовлетворительно (2):</span> <span class="grade-2 fw-bold">${grade2}</span></div>
                <div class="grade-distribution"><span>Всего оценок:</span> <strong>${total}</strong></div>
                <div class="mt-2 pt-1"><span>Средний балл:</span> <strong class="text-info">${average}</strong></div>
                <div class="tooltip-arrow"></div>
            `;
        }

        function buildAbsencesContent(element) {
            const student = element.getAttribute('data-student') || '';
            const subject = element.getAttribute('data-subject') || '';
            const total = element.getAttribute('data-total') || '0';
            const absentH = element.getAttribute('data-h') || '0';
            const absentU = element.getAttribute('data-u') || '0';
            const absentB = element.getAttribute('data-b') || '0';

            return `
                <div class="fw-bold mb-2 border-bottom pb-1">Детализация пропусков</div>
                <div class="fw-bold mb-2">${student}</div>
                <div class="text-muted mb-2">${subject}</div>
                <div class="grade-stat"><span class="text-danger">Неуважительные (Н):</span> <span class="fw-bold">${absentH}</span></div>
                <div class="grade-stat"><span class="text-warning">Уважительные (У):</span> <span class="fw-bold">${absentU}</span></div>
                <div class="grade-stat"><span class="text-success">Болезнь (Б):</span> <span class="fw-bold">${absentB}</span></div>
                <div class="grade-distribution"><span>Всего пропусков:</span> <strong class="text-danger">${total}</strong></div>
                <div class="tooltip-arrow"></div>
            `;
        }

        function positionTooltip(event) {
            const mouseX = event.clientX;
            const mouseY = event.clientY;
            const rect = tooltip.getBoundingClientRect();
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;

            let left = mouseX + 15;
            let top = mouseY + 15;

            if (left + rect.width > viewportWidth - 10) {
                left = mouseX - rect.width - 15;
            }
            if (left < 10) left = 10;
            if (top + rect.height > viewportHeight - 10) {
                top = mouseY - rect.height - 15;
            }
            if (top < 10) top = 10;

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        document.querySelectorAll('.tooltip-trigger').forEach(trigger => {
            trigger.addEventListener('mouseenter', function(e) {
                activeTrigger = this;
                const type = this.getAttribute('data-type');
                let content = '';

                if (type === 'grades') {
                    content = buildGradesContent(this);
                } else if (type === 'absences') {
                    content = buildAbsencesContent(this);
                }

                tooltip.innerHTML = content;
                tooltip.classList.add('show');
                positionTooltip(e);
            });

            trigger.addEventListener('mousemove', function(e) {
                if (activeTrigger === this) {
                    positionTooltip(e);
                }
            });

            trigger.addEventListener('mouseleave', function() {
                if (activeTrigger === this) {
                    tooltip.classList.remove('show');
                    activeTrigger = null;
                }
            });
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
