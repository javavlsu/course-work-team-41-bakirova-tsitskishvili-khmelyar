<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Успеваемость</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .global-tooltip {
            position: fixed;
            z-index: 99999;
            background-color: #1f2937;
            color: white;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 350px;
            white-space: normal;
            word-wrap: break-word;
            pointer-events: none;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .global-tooltip.show {
            visibility: visible;
            opacity: 1;
        }
        .tooltip-trigger {
            cursor: help;
            border-bottom: 1px dashed #6c757d;
            display: inline-block;
        }
        .grade-distribution {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #374151;
        }
        .grade-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .grade-5 { color: #10b981; }
        .grade-4 { color: #3b82f6; }
        .grade-3 { color: #f59e0b; }
        .grade-2 { color: #ef4444; }
        .absence-h { color: #ef4444; }
        .absence-u { color: #f59e0b; }
        .absence-b { color: #10b981; }
        .grade-high { color: #10b981; font-weight: bold; }
        .grade-medium { color: #f59e0b; font-weight: bold; }
        .grade-low { color: #ef4444; font-weight: bold; }
        .grade-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: bold;
            margin-right: 0.25rem;
        }
        .grade-badge-5 { background-color: #d1fae5; color: #065f46; }
        .grade-badge-4 { background-color: #dbeafe; color: #1e40af; }
        .grade-badge-3 { background-color: #fed7aa; color: #9a3412; }
        .grade-badge-2 { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4">Успеваемость</h2>

    <!-- Информация об ученике -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <small class="text-muted">Ученик</small>
                    <h5 class="mb-0" th:text="${studentFullName}">Иванов Иван</h5>
                </div>
                <div class="col-md-6">
                    <small class="text-muted">Класс</small>
                    <h5 class="mb-0" th:text="${className}">9 "А"</h5>
                </div>
            </div>
        </div>
    </div>

    <!-- Фильтр по четвертям -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <form th:action="@{/grades}" method="get" class="row g-3 align-items-center">
                <div class="col-auto">
                    <label for="quarter" class="form-label mb-0 fw-bold">Период:</label>
                </div>
                <div class="col-auto">
                    <select name="quarter" id="quarter" class="form-select" onchange="this.form.submit()">
                        <option th:each="q : ${availableQuarters}"
                                th:value="${q}"
                                th:text="${q == 'Итоговые оценки' ? q : q + ' четверть'}"
                                th:selected="${q == selectedQuarter}"></option>
                    </select>
                </div>
            </form>
        </div>
    </div>

    <!-- Таблица успеваемости -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-bordered table-hover mb-0">
                    <thead class="table-primary">
                    <tr>
                        <th style="width: 50px;">№</th>
                        <th>Предмет</th>
                        <th style="width: 120px;">Средний балл</th>
                        <th>Оценки</th>
                        <th style="width: 100px;">Итоговая</th>
                        <th style="width: 80px;">Пропуски</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="subject, stat : ${subjects}">
                        <td class="text-center" th:text="${stat.count}">1</td>
                        <td th:text="${subject.subjectName}">Математика</td>
                        <td class="text-center">
                                <span class="tooltip-trigger"
                                      th:classappend="${subject.averageGrade >= 4 ? 'grade-high' : (subject.averageGrade >= 3 ? 'grade-medium' : 'grade-low')}"
                                      th:text="${#numbers.formatDecimal(subject.averageGrade, 1, 2)}"
                                      th:attr="data-type='grades',
                                               data-subject=${subject.subjectName},
                                               data-average=${#numbers.formatDecimal(subject.averageGrade, 1, 2)},
                                               data-grade5=${subject.gradeCount5},
                                               data-grade4=${subject.gradeCount4},
                                               data-grade3=${subject.gradeCount3},
                                               data-grade2=${subject.gradeCount2}">0.00</span>
                        </td>
                        <td>
                                <span th:each="grade : ${subject.allGrades}"
                                      th:classappend="'grade-badge grade-badge-' + ${grade}"
                                      th:text="${grade}"></span>
                            <span th:if="${subject.allGrades.isEmpty()}" class="text-muted">—</span>
                        </td>
                        <td class="text-center">
                                <span th:classappend="${subject.quarterFinalGrade >= 4 ? 'grade-high' : (subject.quarterFinalGrade >= 3 ? 'grade-medium' : 'grade-low')}"
                                      th:text="${subject.quarterFinalGrade > 0 ? subject.quarterFinalGrade : '—'}">—</span>
                        </td>
                        <td class="text-center">
                                <span class="tooltip-trigger"
                                      th:classappend="${subject.totalAbsences > 0 ? 'text-danger fw-bold' : 'text-muted'}"
                                      th:text="${subject.totalAbsences}"
                                      th:attr="data-type='absences',
                                               data-subject=${subject.subjectName},
                                               data-total=${subject.totalAbsences},
                                               data-h=${subject.absentTypeH},
                                               data-u=${subject.absentTypeU},
                                               data-b=${subject.absentTypeB}">0</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Сообщение при отсутствии данных -->
    <div th:if="${subjects == null or subjects.isEmpty()}" class="alert alert-warning mt-4 text-center">
        <i class="fas fa-chart-line me-2"></i>
        Нет данных об успеваемости за выбранный период
    </div>
</div>

<!-- Глобальный тултип -->
<div id="globalTooltip" class="global-tooltip"></div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const tooltip = document.getElementById('globalTooltip');
        let activeTrigger = null;

        function buildGradesContent(element) {
            const subject = element.getAttribute('data-subject') || '';
            const average = element.getAttribute('data-average') || '0';
            const grade5 = element.getAttribute('data-grade5') || '0';
            const grade4 = element.getAttribute('data-grade4') || '0';
            const grade3 = element.getAttribute('data-grade3') || '0';
            const grade2 = element.getAttribute('data-grade2') || '0';
            const total = parseInt(grade5) + parseInt(grade4) + parseInt(grade3) + parseInt(grade2);

            return `
                <div class="fw-bold mb-2 border-bottom pb-1">Детализация оценок</div>
                <div class="fw-bold mb-2">${subject}</div>
                <div class="grade-stat"><span>Отлично (5):</span> <span class="grade-5 fw-bold">${grade5}</span></div>
                <div class="grade-stat"><span>Хорошо (4):</span> <span class="grade-4 fw-bold">${grade4}</span></div>
                <div class="grade-stat"><span>Удовлетворительно (3):</span> <span class="grade-3 fw-bold">${grade3}</span></div>
                <div class="grade-stat"><span>Неудовлетворительно (2):</span> <span class="grade-2 fw-bold">${grade2}</span></div>
                <div class="grade-distribution"><span>Всего оценок:</span> <strong>${total}</strong></div>
                <div class="mt-2 pt-1"><span>Средний балл:</span> <strong class="text-info">${average}</strong></div>
                <div class="tooltip-arrow"></div>
            `;
        }

        function buildAbsencesContent(element) {
            const subject = element.getAttribute('data-subject') || '';
            const total = element.getAttribute('data-total') || '0';
            const absentH = element.getAttribute('data-h') || '0';
            const absentU = element.getAttribute('data-u') || '0';
            const absentB = element.getAttribute('data-b') || '0';

            return `
                <div class="fw-bold mb-2 border-bottom pb-1">Детализация пропусков</div>
                <div class="fw-bold mb-2">${subject}</div>
                <div class="grade-stat"><span class="absence-h">Неуважительные (Н):</span> <span class="fw-bold">${absentH}</span></div>
                <div class="grade-stat"><span class="absence-u">Уважительные (У):</span> <span class="fw-bold">${absentU}</span></div>
                <div class="grade-stat"><span class="absence-b">Болезнь (Б):</span> <span class="fw-bold">${absentB}</span></div>
                <div class="grade-distribution"><span>Всего пропусков:</span> <strong class="text-danger">${total}</strong></div>
                <div class="tooltip-arrow"></div>
            `;
        }

        function positionTooltip(event) {
            const mouseX = event.clientX;
            const mouseY = event.clientY;
            const rect = tooltip.getBoundingClientRect();
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;

            let left = mouseX + 15;
            let top = mouseY + 15;

            if (left + rect.width > viewportWidth - 10) {
                left = mouseX - rect.width - 15;
            }
            if (left < 10) left = 10;
            if (top + rect.height > viewportHeight - 10) {
                top = mouseY - rect.height - 15;
            }
            if (top < 10) top = 10;

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
            tooltip.style.right = 'auto';
            tooltip.style.bottom = 'auto';
        }

        const triggers = document.querySelectorAll('.tooltip-trigger');

        triggers.forEach(trigger => {
            trigger.addEventListener('mouseenter', function(e) {
                activeTrigger = this;
                const type = this.getAttribute('data-type');
                let content = '';

                if (type === 'grades') {
                    content = buildGradesContent(this);
                } else if (type === 'absences') {
                    content = buildAbsencesContent(this);
                }

                tooltip.innerHTML = content;
                tooltip.classList.add('show');
                positionTooltip(e);
            });

            trigger.addEventListener('mousemove', function(e) {
                if (activeTrigger === this) {
                    positionTooltip(e);
                }
            });

            trigger.addEventListener('mouseleave', function() {
                if (activeTrigger === this) {
                    tooltip.classList.remove('show');
                    activeTrigger = null;
                }
            });
        });

        document.addEventListener('scroll', function() {
            if (activeTrigger) {
                tooltip.classList.remove('show');
                activeTrigger = null;
            }
        });

        window.addEventListener('resize', function() {
            if (activeTrigger) {
                tooltip.classList.remove('show');
                activeTrigger = null;
            }
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
